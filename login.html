<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentPrint - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#3B82F6', secondary: '#10B981' } } } }</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <i class="fas fa-print text-primary text-4xl"></i>
      <h1 class="text-2xl font-bold text-primary mt-2">StudentPrint</h1>
    </div>

    <!-- Tabs -->
    <div class="flex mb-6 border-b">
      <button id="tab-login" onclick="switchTab('login')"
        class="flex-1 py-2 font-semibold text-primary border-b-2 border-primary">Login</button>
      <button id="tab-register" onclick="switchTab('register')"
        class="flex-1 py-2 font-semibold text-gray-400">Register</button>
    </div>

    <!-- Error/Success message -->
    <div id="msg" class="hidden mb-4 p-3 rounded-lg text-sm text-center"></div>

    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="login-email" required placeholder="you@example.com"
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="login-password" required placeholder="••••••••"
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      <button type="submit"
        class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
        Login
      </button>
    </form>

    <!-- Register Form -->
    <form id="register-form" onsubmit="handleRegister(event)" class="space-y-4 hidden">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" id="reg-name" required placeholder="Your Name"
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="reg-email" required placeholder="you@example.com"
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="reg-password" required placeholder="Min 6 characters"
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      <button type="submit"
        class="w-full bg-secondary text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">
        Create Account
      </button>
    </form>
  </div>

  <script>
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').classList.toggle('hidden', !isLogin);
      document.getElementById('register-form').classList.toggle('hidden', isLogin);
      document.getElementById('tab-login').className = `flex-1 py-2 font-semibold ${isLogin ? 'text-primary border-b-2 border-primary' : 'text-gray-400'}`;
      document.getElementById('tab-register').className = `flex-1 py-2 font-semibold ${!isLogin ? 'text-primary border-b-2 border-primary' : 'text-gray-400'}`;
      showMsg('', '');
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      if (!text) { el.classList.add('hidden'); return; }
      el.textContent = text;
      el.className = `mb-4 p-3 rounded-lg text-sm text-center ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
    }

    async function handleLogin(e) {
      e.preventDefault();
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value })
        });
        const data = await res.json();
        if (!res.ok) return showMsg(data.message || 'Login failed', 'error');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (err) {
        showMsg('Server error. Please try again later.', 'error');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const password = document.getElementById('reg-password').value;
      if (password.length < 6) return showMsg('Password must be at least 6 characters', 'error');
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: document.getElementById('reg-name').value, email: document.getElementById('reg-email').value, password })
        });
        const data = await res.json();
        if (!res.ok) return showMsg(data.message || 'Registration failed', 'error');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (err) {
        showMsg('Server error. Please try again later.', 'err');
      }
    }

    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = '/';
  </script>
</body>
</html>
