<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentPrint - Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#3B82F6' } } } }</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <div class="text-center mb-8">
      <i class="fas fa-shield-alt text-primary text-4xl"></i>
      <h1 class="text-2xl font-bold text-gray-800 mt-2">Admin Access</h1>
      <p class="text-gray-500 text-sm mt-1">StudentPrint Dashboard</p>
    </div>

    <div id="msg" class="hidden mb-4 p-3 rounded-lg text-sm text-center"></div>

    <form onsubmit="handleAdminLogin(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" id="admin-user" required placeholder="admin"
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <input type="password" id="admin-pass" required placeholder="••••••••"
            class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary pr-10">
          <button type="button" onclick="togglePass()" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600">
            <i id="eye-icon" class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit"
        class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
        <i class="fas fa-sign-in-alt mr-2"></i>Login
      </button>
    </form>

    <p class="text-center mt-4 text-sm text-gray-400">
      <a href="/" class="hover:text-primary"><i class="fas fa-arrow-left mr-1"></i>Back to Site</a>
    </p>
  </div>

  <script>
    if (sessionStorage.getItem('adminToken')) window.location.href = '/admin';

    function togglePass() {
      const input = document.getElementById('admin-pass');
      const icon = document.getElementById('eye-icon');
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    }

    async function handleAdminLogin(e) {
      e.preventDefault();
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('admin-user').value,
          password: document.getElementById('admin-pass').value
        })
      });
      const data = await res.json();
      if (!res.ok) {
        const msg = document.getElementById('msg');
        msg.textContent = data.message;
        msg.className = 'mb-4 p-3 rounded-lg text-sm text-center bg-red-100 text-red-700';
        return;
      }
      sessionStorage.setItem('adminToken', data.token);
      window.location.href = '/admin';
    }
  </script>
</body>
</html>
